name: Documentation Validation

on:
  push:
    branches: [ main, master ]
    paths:
      - 'docs/**'
      - 'CLI_REFERENCE.md'
      - 'README.md'
      - 'FORMAL_SPEC.md'
      - 'PHASE2_FORMAL_SPEC.md'
      - 'src/**/*.rs'
      - 'scripts/validate-docs.sh'
      - '.github/workflows/docs-validation.yml'
  pull_request:
    branches: [ main, master ]
    paths:
      - 'docs/**'
      - 'CLI_REFERENCE.md'
      - 'README.md'
      - 'FORMAL_SPEC.md'
      - 'PHASE2_FORMAL_SPEC.md'
      - 'src/**/*.rs'
      - 'scripts/validate-docs.sh'
      - '.github/workflows/docs-validation.yml'

jobs:
  validate-docs:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
      
    - name: Setup Rust toolchain
      uses: actions-rs/toolchain@v1
      with:
        profile: minimal
        toolchain: stable
        override: true
        
    - name: Cache cargo registry
      uses: actions/cache@v4
      with:
        path: ~/.cargo/registry
        key: ${{ runner.os }}-cargo-registry-${{ hashFiles('**/Cargo.lock') }}
        restore-keys: |
          ${{ runner.os }}-cargo-registry-
          
    - name: Cache cargo index
      uses: actions/cache@v4
      with:
        path: ~/.cargo/git
        key: ${{ runner.os }}-cargo-git-${{ hashFiles('**/Cargo.lock') }}
        restore-keys: |
          ${{ runner.os }}-cargo-git-
          
    - name: Cache cargo build
      uses: actions/cache@v4
      with:
        path: target
        key: ${{ runner.os }}-cargo-build-${{ hashFiles('**/Cargo.lock') }}
        restore-keys: |
          ${{ runner.os }}-cargo-build-
          
    - name: Install dependencies (if needed)
      run: |
        # Install any additional tools needed for doc validation
        # Currently none required
        echo "All dependencies satisfied"
    
    - name: Install Foundry (Forge/Anvil)
      uses: foundry-rs/foundry-toolchain@v1
      
    - name: Build eth_node CLI
      run: cargo build --release
        
    - name: Make validation scripts executable
      run: |
        chmod +x scripts/validate-docs.sh
        chmod +x scripts/test-complete-docs.sh
      
    - name: Run static documentation validation
      run: bash scripts/validate-docs.sh
    
    - name: Start Anvil test network
      run: |
        anvil &
        sleep 2
        
    - name: Run executable examples validation
      run: bash scripts/test-complete-docs.sh
      
    - name: Report validation results
      if: always()
      run: |
        echo "Documentation validation completed"
        echo "✅ Static checks and executable examples validated"
